version: "3.8"

services:
  backend:
    build: ./backend
    container_name: mywallet-backend
    ports:
      - "8080:8080"
    environment:
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:8080/mywallet
    container_name: mywallet-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
