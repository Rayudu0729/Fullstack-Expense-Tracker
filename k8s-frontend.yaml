apiVersion: apps/v1
kind: Deployment
metadata:
  name: mywallet-frontend
  labels:
    app: mywallet-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mywallet-frontend
  template:
    metadata:
      labels:
        app: mywallet-frontend
    spec:
      containers:
      - name: frontend
        image: mywallet.azurecr.io/mywallet-frontend:latest 
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mywallet-frontend-service
spec:
  type: ClusterIP # Changed to ClusterIP so Ingress handles the public access
  selector:
    app: mywallet-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mywallet-frontend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # Put EXACTLY the name of your existing ClusterIssuer here:
    cert-manager.io/cluster-issuer: letsencrypt-prod 
spec:
  tls:
  - hosts:
    - mywallet.rayududev.live # Replace with your actual domain
    secretName: mywallet-frontend-tls # Cert-Manager will save the SSL cert here
  rules:
  - host: mywallet.rayududev.live # Replace with your actual domain
    http:
      paths:
      - path: /mywallet
        pathType: Prefix
        backend:
          service:
            name: mywallet-backend-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mywallet-frontend-service
            port:
              number: 80
