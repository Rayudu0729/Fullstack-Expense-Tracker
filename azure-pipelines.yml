trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  ACR_NAME: mywallet
  ACR_LOGIN_SERVER: mywallet.azurecr.io

steps:

- checkout: self

- script: |
    echo "Building backend image"
    docker build -t $(ACR_LOGIN_SERVER)/mywallet-backend:$(Build.BuildId) backend
  displayName: Build Backend

- script: |
    echo "Building frontend image"
    docker build -t $(ACR_LOGIN_SERVER)/mywallet-frontend:$(Build.BuildId) frontend
  displayName: Build Frontend

- task: AzureCLI@2
  displayName: Login to ACR
  inputs:
    azureSubscription: AzureServiceConnection
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az acr login --name $(ACR_NAME)

- script: |
    docker push $(ACR_LOGIN_SERVER)/mywallet-backend:$(Build.BuildId)
  displayName: Push Backend Image

- script: |
    docker push $(ACR_LOGIN_SERVER)/mywallet-frontend:$(Build.BuildId)
  displayName: Push Frontend Image