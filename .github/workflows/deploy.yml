name: Build Push and Deploy

on:
  push:
    branches:
      - main

env:
  ACR_NAME: mywallet

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3


    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}


    - name: Login to Azure Container Registry
      run: |
        az acr login --name $ACR_NAME


    - name: Build Backend Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/mywallet-backend:${{ github.sha }} ./backend


    - name: Push Backend Image
      run: |
        docker push $ACR_NAME.azurecr.io/mywallet-backend:${{ github.sha }}


    - name: Build Frontend Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/mywallet-frontend:${{ github.sha }} ./frontend


    - name: Push Frontend Image
      run: |
        docker push $ACR_NAME.azurecr.io/mywallet-frontend:${{ github.sha }}


    - name: Update GitOps Repo
      run: |

        git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/YOUR_USERNAME/mywallet-gitops.git

        cd mywallet-gitops

        sed -i "s|mywallet-backend:.*|mywallet-backend:${{ github.sha }}|" backend/deployment.yaml

        sed -i "s|mywallet-frontend:.*|mywallet-frontend:${{ github.sha }}|" frontend/deployment.yaml

        git config user.name "github-actions"

        git config user.email "actions@github.com"

        git add .

        git commit -m "update images"

        git push